<script>
// ===== UI生成 =====
function createItem(u) {
  const div = document.createElement("div");
  div.className = "item";

  div.innerHTML = `
    <div class="name" onclick="toggle(${u.row})">
      ${u.name}
    </div>

    <div class="detail" id="detail_${u.row}">
      <label>名前</label>
      <input id="name_${u.row}" value="${u.name || ""}">

      <label>フリガナ</label>
      <input id="kana_${u.row}" value="${u.kana || ""}">

      <label>年齢</label>
      <input id="age_${u.row}" value="${u.age || ""}">

      <label>所属</label>
      <input id="club_${u.row}" value="${u.club || ""}">

      <label>ランク</label>
      <select id="rank_${u.row}">
        <option value="初級" ${u.rank==="初級"?"selected":""}>初級</option>
        <option value="中級" ${u.rank==="中級"?"selected":""}>中級</option>
        <option value="上級" ${u.rank==="上級"?"selected":""}>上級</option>
      </select>

      <button class="save" onclick="updateUser(${u.row})">
        保存
      </button>

      <button class="delete" onclick="deleteUser(${u.row})">
        辞退（削除）
      </button>
    </div>
  `;

  document.getElementById("list").appendChild(div);
}

// ===== 開閉 =====
function toggle(row) {
  const el = document.getElementById("detail_" + row);

  if (el.style.display === "block") {
    el.style.display = "none";
  } else {
    el.style.display = "block";
  }
}

// ===== 更新 =====
async function updateUser(row) {

  const url =
    GAS_URL +
    "?type=update" +
    "&row=" + row +
    "&name=" + encodeURIComponent(document.getElementById("name_" + row).value) +
    "&kana=" + encodeURIComponent(document.getElementById("kana_" + row).value) +
    "&age=" + encodeURIComponent(document.getElementById("age_" + row).value) +
    "&club=" + encodeURIComponent(document.getElementById("club_" + row).value) +
    "&rank=" + encodeURIComponent(document.getElementById("rank_" + row).value);

  const res = await fetch(url);
  const data = await res.json();

  if (data.result === "update_ok") {

    // キャッシュ削除
    localStorage.removeItem("initData");

    alert("更新しました");

    loadUsers();
  }
}

// ===== 削除 =====
async function deleteUser(row) {

  if (!confirm("本当に辞退しますか？")) return;

  const res = await fetch(
    GAS_URL + "?type=delete&row=" + row
  );

  const data = await res.json();

  if (data.result === "delete_ok") {

    localStorage.removeItem("initData");

    alert("削除しました");

    loadUsers();
  }
}

<script>
// ===== 参加者追加 =====
async function addMember() {

  if (userCount >= 10) {
    alert("最大10人までです");
    return;
  }

  const name = prompt("名前を入力してください");

  if (!name) return;

  const url =
    GAS_URL +
    "?type=write" +
    "&userId=" + encodeURIComponent(userId) +
    "&name=" + encodeURIComponent(name) +
    "&kana=" +
    "&age=" +
    "&club=" +
    "&rank=";

  const res = await fetch(url);
  const data = await res.json();

  if (data.result === "duplicate") {
    alert("同じ名前があります");
    return;
  }

  if (data.result === "write_ok") {

    // キャッシュ削除
    localStorage.removeItem("initData");

    alert("追加しました");

    loadUsers();
  }
}

// ===== 初期化 =====
init();

</script>
