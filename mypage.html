<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<base target="_top">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>マイページ</title>

<style>
body {
  font-family: sans-serif;
  background: #f5f5f5;
  padding: 20px;
}
.container {
  max-width: 500px;
  margin: auto;
}
.card {
  background: white;
  padding: 15px;
  margin-bottom: 15px;
  border-radius: 10px;
}
label {
  font-size: 13px;
}
input, select {
  width: 100%;
  padding: 8px;
  margin-bottom: 10px;
}
button {
  width: 100%;
  padding: 10px;
  margin-top: 5px;
  border: none;
  border-radius: 6px;
}
.save { background: #06C755; color: white; }
.delete { background: #ff4d4f; color: white; }
.loading {
  text-align: center;
}
</style>
</head>

<body>

<div class="container">
  <h2>マイページ（複数人）</h2>
  <div id="loading" class="loading">読み込み中...</div>
  <div id="list"></div>
</div>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<script>
const LIFF_ID = "2009789600-3P82J7YF";
const GAS_URL = "https://script.google.com/macros/s/AKfycby8RrBjjvBFKU6G1D8tJD2SL3BHsSOqAE2nkpDdlhjykOsYI03a3uO0sN6URfIBcGQl/exec";

let userId = "";

// ===== 初期化 =====
async function init() {
  await liff.init({ liffId: LIFF_ID });

  if (!liff.isLoggedIn()) {
    liff.login();
    return;
  }

  const profile = await liff.getProfile();
  userId = profile.userId;

  loadUsers();
}

// ===== 一覧取得 =====
async function loadUsers() {
  try {
    const res = await fetch(GAS_URL + "?type=getUsers&userId=" + userId);
    const data = await res.json();

    document.getElementById("loading").style.display = "none";

    if (data.list.length === 0) {
      document.getElementById("list").innerHTML = "登録がありません";
      return;
    }

    const list = document.getElementById("list");
    list.innerHTML = "";

    data.list.forEach(u => {

      const div = document.createElement("div");
      div.className = "card";

      div.innerHTML = `
        <label>名前</label>
        <input id="name_${u.row}" value="${u.name}">

        <label>フリガナ</label>
        <input id="kana_${u.row}" value="${u.kana}">

        <label>年齢</label>
        <input id="age_${u.row}" value="${u.age}">

        <label>所属</label>
        <input id="club_${u.row}" value="${u.club}">

        <label>ランク</label>
        <select id="rank_${u.row}">
          <option ${u.rank=="初級"?"selected":""}>初級</option>
          <option ${u.rank=="中級"?"selected":""}>中級</option>
          <option ${u.rank=="上級"?"selected":""}>上級</option>
        </select>

        <button class="save" onclick="updateUser(${u.row})">保存</button>
        <button class="delete" onclick="deleteUser(${u.row})">辞退（削除）</button>
      `;

      list.appendChild(div);
    });

  } catch (e) {
    alert("通信エラー：" + e);
    console.error(e);
  }
}

// ===== 更新 =====
async function updateUser(row) {

  const url = GAS_URL +
    "?type=update" +
    "&row=" + row +
    "&name=" + encodeURIComponent(document.getElementById("name_"+row).value) +
    "&kana=" + encodeURIComponent(document.getElementById("kana_"+row).value) +
    "&age=" + encodeURIComponent(document.getElementById("age_"+row).value) +
    "&club=" + encodeURIComponent(document.getElementById("club_"+row).value) +
    "&rank=" + encodeURIComponent(document.getElementById("rank_"+row).value);

  const res = await fetch(url);
  const data = await res.json();

  if (data.result === "update_ok") {
    alert("更新しました");
  }
}

// ===== 削除 =====
async function deleteUser(row) {

  if (!confirm("本当に辞退しますか？")) return;

  const res = await fetch(GAS_URL + "?type=delete&row=" + row);
  const data = await res.json();

  if (data.result === "delete_ok") {
    alert("削除しました");
    loadUsers();
  }
}

init();
</script>

</body>
</html>
