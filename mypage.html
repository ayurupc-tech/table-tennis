<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>マイページ</title>
</head>
<body>

<h1>マイページ</h1>

<div id="name">読み込み中...</div>

<button onclick="back()">戻る</button>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<script>
const LIFF_ID = "2009789600-3P82J7YF";
const GAS_URL = "https://script.google.com/macros/s/AKfycby8RrBjjvBFKU6G1D8tJD2SL3BHsSOqAE2nkpDdlhjykOsYI03a3uO0sN6URfIBcGQl/exec";

async function init() {

  await liff.init({ liffId: LIFF_ID });

  const profile = await liff.getProfile();
  const userId = profile.userId;

  const res = await fetch(GAS_URL + "?type=getUser&userId=" + userId);
  const data = await res.json();

  document.getElementById("name").innerText = data.name;
}

function back() {
  location.href = "index.html";
}

init();
</script>

</body>
</html>
