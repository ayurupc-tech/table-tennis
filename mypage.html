<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<base target="_top">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>マイページ</title>

<style>
body {
  font-family: sans-serif;
  background: #f5f5f5;
  padding: 20px;
}
.container {
  max-width: 500px;
  margin: auto;
}
.item {
  background: white;
  margin-bottom: 10px;
  border-radius: 10px;
  overflow: hidden;
}
.name {
  padding: 15px;
  font-size: 18px;
  font-weight: bold;
  cursor: pointer;
  background: #eee;
}
.detail {
  display: none;
  padding: 15px;
}
label {
  font-size: 13px;
}
input, select {
  width: 100%;
  padding: 8px;
  margin-bottom: 10px;
}
button {
  width: 100%;
  padding: 10px;
  margin-top: 5px;
  border: none;
  border-radius: 6px;
}
.save { background: #06C755; color: white; }
.delete { background: #ff4d4f; color: white; }
.add { background: #007bff; color: white; margin-top: 15px; }
.loading {
  text-align: center;
}
</style>
</head>

<body>

<div class="container">
  <h2>マイページ（複数人）</h2>

  <div id="loading" class="loading">読み込み中...</div>
  <div id="list"></div>

  <button class="add" onclick="addMember()">＋参加者追加</button>
</div>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<script>
const LIFF_ID = "2009789600-3P82J7YF";
const GAS_URL = "https://script.google.com/macros/s/AKfycby8RrBjjvBFKU6G1D8tJD2SL3BHsSOqAE2nkpDdlhjykOsYI03a3uO0sN6URfIBcGQl/exec";

let userId = "";
let userCount = 0;

// ===== 初期化 =====
async function init() {
  await liff.init({ liffId: LIFF_ID });

  if (!liff.isLoggedIn()) {
    liff.login();
    return;
  }

  const profile = await liff.getProfile();
  userId = profile.userId;

  loadUsers();
}

// ===== 一覧取得 =====
async function loadUsers() {
  try {
    const res = await fetch(GAS_URL + "?type=getUsers&userId=" + userId);
    const data = await res.json();

    document.getElementById("loading").style.display = "none";

    const list = document.getElementById("list");
    list.innerHTML = "";

    userCount = data.list.length;

    if (userCount === 0) {
      list.innerHTML = "登録がありません";
      return;
    }

    data.list.forEach(u => createItem(u));

  } catch (e) {
    alert("通信エラー：" + e);
    console.error(e);
  }
}

// ===== UI生成 =====
function createItem(u) {

  const div = document.createElement("div");
  div.className = "item";

  div.innerHTML = `
    <div class="name" onclick="toggle(${u.row})">${u.name}</div>

    <div class="detail" id="detail_${u.row}">
      <label>名前</label>
      <input id="name_${u.row}" value="${u.name}">

      <label>フリガナ</label>
      <input id="kana_${u.row}" value="${u.kana}">

      <label>年齢</label>
      <input id="age_${u.row}" value="${u.age}">

      <label>所属</label>
      <input id="club_${u.row}" value="${u.club}">

      <label>ランク</label>
      <select id="rank_${u.row}">
        <option ${u.rank=="初級"?"selected":""}>初級</option>
        <option ${u.rank=="中級"?"selected":""}>中級</option>
        <option ${u.rank=="上級"?"selected":""}>上級</option>
      </select>

      <button class="save" onclick="updateUser(${u.row})">保存</button>
      <button class="delete" onclick="deleteUser(${u.row})">辞退（削除）</button>
    </div>
  `;

  document.getElementById("list").appendChild(div);
}

// ===== 開閉 =====
function toggle(row) {
  const el = document.getElementById("detail_" + row);
  el.style.display = (el.style.display === "block") ? "none" : "block";
}

// ===== 更新（そのまま維持）=====
async function updateUser(row) {
  const url = GAS_URL +
    "?type=update" +
    "&row=" + row +
    "&name=" + encodeURIComponent(document.getElementById("name_"+row).value) +
    "&kana=" + encodeURIComponent(document.getElementById("kana_"+row).value) +
    "&age=" + encodeURIComponent(document.getElementById("age_"+row).value) +
    "&club=" + encodeURIComponent(document.getElementById("club_"+row).value) +
    "&rank=" + encodeURIComponent(document.getElementById("rank_"+row).value);

  const res = await fetch(url);
  const data = await res.json();

  if (data.result === "update_ok") {
    alert("更新しました");
    loadUsers();
  }
}

// ===== 削除（そのまま維持）=====
async function deleteUser(row) {

  if (!confirm("本当に辞退しますか？")) return;

  const res = await fetch(GAS_URL + "?type=delete&row=" + row);
  const data = await res.json();

  if (data.result === "delete_ok") {
    alert("削除しました");
    loadUsers();
  }
}

// ===== 追加（新規）=====
async function addMember() {

  if (userCount >= 10) {
    alert("最大10人までです");
    return;
  }

  const name = prompt("名前を入力してください");
  if (!name) return;

  const url = GAS_URL +
    "?type=write" +
    "&userId=" + encodeURIComponent(userId) +
    "&name=" + encodeURIComponent(name) +
    "&kana=" +
    "&age=" +
    "&club=" +
    "&rank=";

  const res = await fetch(url);
  const data = await res.json();

  if (data.result === "duplicate") {
    alert("同じ名前があります");
    return;
  }

  if (data.result === "write_ok") {
    alert("追加しました");
    loadUsers();
  }
}

init();
</script>

</body>
</html>
