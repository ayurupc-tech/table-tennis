<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>アナウンス設定</title>

<style>
body { font-family:sans-serif; background:#f5f5f5; padding:10px; }
.container { max-width:500px; margin:auto; }
.box { background:white; margin-top:10px; padding:10px; border-radius:10px; }
.item { padding:8px 0; border-bottom:1px solid #eee; }
button { width:100%; padding:12px; margin-top:10px; border:none; border-radius:8px; }
.save { background:#06C755; color:white; }
</style>

</head>
<body>

<div class="container">

  <div class="box">
    <h3>通知ON</h3>
    <div id="onList"></div>
  </div>

  <button class="save" onclick="save()">設定を確定</button>

  <div class="box">
    <h3>通知OFF</h3>
    <div id="offList"></div>
  </div>

</div>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script>

const LIFF_ID = "2009789600-HXuo8awK";
const GAS_URL = "https://script.google.com/macros/s/AKfycby8RrBjjvBFKU6G1D8tJD2SL3BHsSOqAE2nkpDdlhjykOsYI03a3uO0sN6URfIBcGQl/exec";

let userId = "";
let myMembers = [];
let clubMembers = [];
let selected = {};

// ===== 初期化 =====
async function init() {

  await liff.init({ liffId: LIFF_ID });

  if (!liff.isLoggedIn()) {
    liff.login();
    return;
  }

  const profile = await liff.getProfile();
  userId = profile.userId;

  loadData();
}

// ===== データ取得（1回だけ）=====
async function loadData() {

  const res = await fetch(GAS_URL + "?type=getInitData&userId=" + userId);
  const data = await res.json();

  if (data.result !== "ok") {
    alert("取得失敗");
    return;
  }

  myMembers = data.myMembers || [];
  clubMembers = data.clubMembers || [];

  // 🔥 ここ重要（GASから一緒に返す）
  if (data.targets) {
    data.targets.split(",").forEach(id => {
      if (id) selected[id] = true;
    });
  }

  if (myMembers.length === 0) {
    alert("参加者がいません");
    return;
  }

  render();
}

// ===== 描画 =====
function render() {

  const onList = document.getElementById("onList");
  const offList = document.getElementById("offList");

  onList.innerHTML = "";
  offList.innerHTML = "";

  // 自分（強制ON）
  myMembers.forEach(m => {
    onList.innerHTML += `<div class="item">✔ ${m.name}</div>`;
  });

  // 同クラブ
  clubMembers.forEach(m => {

    if (myMembers.some(x => x.row === m.row)) return;

    if (selected[m.row]) {
      onList.appendChild(createCheckbox(m, true));
    } else {
      offList.appendChild(createCheckbox(m, false));
    }

  });
}

// ===== チェック =====
function createCheckbox(m, isOn) {

  const div = document.createElement("div");
  div.className = "item";

  div.innerHTML = `
    <input type="checkbox" ${isOn ? "checked" : ""} onchange="toggle(${m.row})">
    ${m.name}
  `;

  return div;
}

// ===== 切替 =====
function toggle(row) {
  selected[row] = !selected[row];
  render();
}

// ===== 保存 =====
async function save() {

  let targets = [];

  for (let key in selected) {
    if (selected[key]) targets.push(key);
  }

  await fetch(
    GAS_URL +
    "?type=saveAnnouncement" +
    "&userId=" + userId +
    "&targets=" + targets.join(",")
  );

  alert("保存しました");
}

init();

</script>
</body>
</html>
