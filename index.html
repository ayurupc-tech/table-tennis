<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <base target="_top">
  <title>読み込み中</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: sans-serif;
      background: #fff;
    }
  </style>
</head>
<body>

<h2>読み込み中...</h2>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<script>
const LIFF_ID = "2009789600-3P82J7YF";
const GAS_URL = "https://script.google.com/macros/s/AKfycby8RrBjjvBFKU6G1D8tJD2SL3BHsSOqAE2nkpDdlhjykOsYI03a3uO0sN6URfIBcGQl/exec";

async function main() {

  try {
    // ===== LIFF初期化 =====
    await liff.init({ liffId: LIFF_ID });

    if (!liff.isLoggedIn()) {
      liff.login();
      return;
    }

    // ===== ユーザー取得 =====
    const profile = await liff.getProfile();
    const userId = profile.userId;

    // ===== GAS確認 =====
    const res = await fetch(GAS_URL + "?type=checkUser&userId=" + userId);
    const data = await res.json();

    // ===== 遷移 =====
    if (data.status === "exists") {
      location.href = "mypage.html";
    } else {
      location.href = "entry.html";
    }

  } catch (e) {
    alert("エラー：" + e);
    console.error(e);
  }
}

// 起動
main();
</script>

</body>
</html>
