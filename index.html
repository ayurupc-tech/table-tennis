<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>読み込み中</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>

<h2>読み込み中...</h2>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<script>
const LIFF_ID = "2009789600-3P82J7YF";
const GAS_URL = "https://script.google.com/macros/s/AKfycby8RrBjjvBFKU6G1D8tJD2SL3BHsSOqAE2nkpDdlhjykOsYI03a3uO0sN6URfIBcGQl/exec";

async function main() {

  try {

    // LIFF初期化
    await liff.init({ liffId: LIFF_ID });

    // ログイン
    if (!liff.isLoggedIn()) {
      liff.login();
      return;
    }

    // userId取得
    const profile = await liff.getProfile();
    const userId = profile.userId;

    // GASで存在チェック
    const res = await fetch(GAS_URL + "?type=checkUser&userId=" + userId);
    const data = await res.json();

    // 分岐
    if (data.status === "exists") {
      window.location.href = GAS_URL + "?page=mypage";
    } else {
      window.location.href = GAS_URL + "?page=entry";
    }

  } catch (e) {
    alert("エラー：" + e);
    console.error(e);
  }
}

main();
</script>

</body>
</html>
