<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>読み込み中</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
</head>
<body>

<h2>読み込み中...</h2>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<script>
const LIFF_ID = "2009789600-3P82J7YF";
const GAS_URL = "https://script.google.com/macros/s/AKfycby8RrBjjvBFKU6G1D8tJD2SL3BHsSOqAE2nkpDdlhjykOsYI03a3uO0sN6URfIBcGQl/exec";

async function main() {

  await liff.init({ liffId: LIFF_ID });

  if (!liff.isLoggedIn()) {
    liff.login();
    return;
  }

  const profile = await liff.getProfile();
  const userId = profile.userId;

  const res = await fetch(GAS_URL + "?type=checkUser&userId=" + userId);
  const data = await res.json();

  if (data.status === "exists") {
    location.href = "mypage.html";
  } else {
    location.href = "entry.html";
  }
}

main();
</script>

</body>
</html>
