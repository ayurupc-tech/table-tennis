<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <base target="_top">
  <title>エントリー</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 500px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
    }

    h2 {
      text-align: center;
    }

    .form-group {
      margin-bottom: 15px;
    }

    label {
      display: block;
      font-size: 14px;
      margin-bottom: 5px;
    }

    input, select {
      width: 100%;
      padding: 10px;
      font-size: 16px;
      border-radius: 6px;
      border: 1px solid #ccc;
    }

    button {
      width: 100%;
      padding: 14px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      background: #06C755;
      color: white;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="container">

  <h2>エントリー登録</h2>

  <div class="form-group">
    <label>名前</label>
    <input type="text" id="name">
  </div>

  <div class="form-group">
    <label>フリガナ</label>
    <input type="text" id="kana">
  </div>

  <div class="form-group">
    <label>年齢</label>
    <input type="number" id="age">
  </div>

  <div class="form-group">
    <label>所属チーム・クラブ</label>
    <input type="text" id="club">
  </div>

  <div class="form-group">
    <label>出場ランク</label>
    <select id="rank">
      <option value="">選択してください</option>
      <option value="初級">初級</option>
      <option value="中級">中級</option>
      <option value="上級">上級</option>
    </select>
  </div>

  <button onclick="submitData()">登録する</button>

</div>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<script>
const LIFF_ID = "2009789600-3P82J7YF";
const GAS_URL = "https://script.google.com/macros/s/AKfycby8RrBjjvBFKU6G1D8tJD2SL3BHsSOqAE2nkpDdlhjykOsYI03a3uO0sN6URfIBcGQl/exec";

let userId = "";

async function init() {
  await liff.init({ liffId: LIFF_ID });

  if (!liff.isLoggedIn()) {
    liff.login();
    return;
  }

  const profile = await liff.getProfile();
  userId = profile.userId;
}

// ===== 送信 =====
async function submitData() {

  const name = document.getElementById("name").value;
  const kana = document.getElementById("kana").value;
  const age = document.getElementById("age").value;
  const club = document.getElementById("club").value;
  const rank = document.getElementById("rank").value;

  if (!name || !kana || !age || !club || !rank) {
    alert("すべて入力してください");
    return;
  }

  const url = GAS_URL +
    "?type=write" +
    "&userId=" + encodeURIComponent(userId) +
    "&name=" + encodeURIComponent(name) +
    "&kana=" + encodeURIComponent(kana) +
    "&age=" + encodeURIComponent(age) +
    "&club=" + encodeURIComponent(club) +
    "&rank=" + encodeURIComponent(rank);

  try {
    const res = await fetch(url);
    const data = await res.json();

    if (data.result === "write_ok") {
      alert("登録完了！");
      location.href = "mypage.html";
    } else {
      alert("登録失敗");
    }

  } catch (e) {
    alert("通信エラー：" + e);
    console.error(e);
  }
}

init();
</script>

</body>
</html>
