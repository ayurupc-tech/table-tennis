<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <base target="_top">
  <title>エントリー</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 20px;
    }

    .container {
      max-width: 500px;
      margin: auto;
      background: white;
      padding: 20px;
      border-radius: 10px;
    }

    h2 {
      text-align: center;
    }

    .member {
      border: 1px solid #ddd;
      padding: 15px;
      margin-bottom: 15px;
      border-radius: 8px;
      position: relative;
    }

    .remove-btn {
      position: absolute;
      top: 10px;
      right: 10px;
      background: #ff4d4f;
      color: white;
      border: none;
      border-radius: 50%;
      width: 28px;
      height: 28px;
      font-size: 16px;
      cursor: pointer;
    }

    .form-group {
      margin-bottom: 10px;
    }

    label {
      font-size: 14px;
      display: block;
    }

    input, select {
      width: 100%;
      padding: 8px;
      margin-top: 4px;
    }

    .suggest {
      background: #eee;
      padding: 5px;
      margin-top: 5px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border: none;
      border-radius: 8px;
      font-size: 16px;
    }

    .add-btn {
      background: #007bff;
      color: white;
    }

    .submit-btn {
      background: #06C755;
      color: white;
    }

    button:disabled {
      background: #999;
    }

  </style>
</head>

<body>

<div class="container">
  <h2>複数エントリー登録</h2>

  <div id="members"></div>

  <button class="add-btn" onclick="addMember()">＋追加</button>
  <button id="submitBtn" class="submit-btn" onclick="submitData()">まとめて登録</button>

</div>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>

<script>
const LIFF_ID = "2009789600-3P82J7YF";
const GAS_URL = "https://script.google.com/macros/s/AKfycby8RrBjjvBFKU6G1D8tJD2SL3BHsSOqAE2nkpDdlhjykOsYI03a3uO0sN6URfIBcGQl/exec";

let userId = "";
let memberCount = 0;
let isSubmitting = false;

// ===== 初期化 =====
async function init() {
  await liff.init({ liffId: LIFF_ID });

  if (!liff.isLoggedIn()) {
    liff.login();
    return;
  }

  const profile = await liff.getProfile();
  userId = profile.userId;

  addMember(); // 初期1人
}

// ===== メンバー追加 =====
function addMember() {
  if (memberCount >= 10) {
    alert("最大10人までです");
    return;
  }

  memberCount++;

  const div = document.createElement("div");
  div.className = "member";

  div.innerHTML = `
    ${memberCount > 1 ? `<button class="remove-btn" onclick="removeMember(this)">−</button>` : ""}

    <h3>参加者 ${memberCount}</h3>

    <div class="form-group">
      <label>名前</label>
      <input type="text" class="name">
    </div>

    <div class="form-group">
      <label>フリガナ</label>
      <input type="text" class="kana">
    </div>

    <div class="form-group">
      <label>年齢</label>
      <input type="number" class="age">
    </div>

    <div class="form-group">
      <label>所属チーム</label>
      <input type="text" class="club">
      ${memberCount > 1 ? `<div class="suggest" onclick="applyClub(this)">↑1人目と同じクラブを使用</div>` : ""}
    </div>

    <div class="form-group">
      <label>出場ランク</label>
      <select class="rank">
        <option value="">選択してください</option>
        <option value="初級">初級</option>
        <option value="中級">中級</option>
        <option value="上級">上級</option>
      </select>
    </div>
  `;

  document.getElementById("members").appendChild(div);
}

// ===== 削除 =====
function removeMember(btn) {
  btn.parentElement.remove();
  memberCount--;
}

// ===== クラブコピー =====
function applyClub(el) {
  const firstClub = document.querySelector(".member .club").value;
  if (!firstClub) {
    alert("1人目のクラブを先に入力してください");
    return;
  }
  el.parentElement.querySelector(".club").value = firstClub;
}

// ===== 送信 =====
async function submitData() {

  if (isSubmitting) return;
  isSubmitting = true;

  const btn = document.getElementById("submitBtn");
  btn.disabled = true;
  btn.innerText = "送信中...";

  const members = document.querySelectorAll(".member");

  let requests = [];

  for (let m of members) {

    const name = m.querySelector(".name").value;
    const kana = m.querySelector(".kana").value;
    const age = m.querySelector(".age").value;
    const club = m.querySelector(".club").value;
    const rank = m.querySelector(".rank").value;

    if (!name || !kana || !age || !club || !rank) {
      alert("未入力の参加者があります");
      resetButton();
      return;
    }

    const url = GAS_URL +
      "?type=write" +
      "&userId=" + encodeURIComponent(userId) +
      "&name=" + encodeURIComponent(name) +
      "&kana=" + encodeURIComponent(kana) +
      "&age=" + encodeURIComponent(age) +
      "&club=" + encodeURIComponent(club) +
      "&rank=" + encodeURIComponent(rank);

    requests.push(fetch(url).then(res => res.json()));
  }

  try {

    const results = await Promise.all(requests);

    for (let r of results) {
      if (r.result === "duplicate") {
        alert("同じ登録された名前があります");
        resetButton();
        return;
      }
    }

    alert("全員登録完了！");
    location.href = "mypage.html";

  } catch (e) {
    alert("通信エラー：" + e);
    console.error(e);
    resetButton();
  }
}

// ===== ボタン復帰 =====
function resetButton() {
  const btn = document.getElementById("submitBtn");
  btn.disabled = false;
  btn.innerText = "まとめて登録";
  isSubmitting = false;
}

init();
</script>

</body>
</html>
